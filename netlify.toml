# ─────────────────────────────────────────────────────────────────────────
#  Netlify configuration for Rhinelab (static Astro site)
#
#  To deploy: connect this repository in the Netlify dashboard. Netlify reads
#  this file automatically — no manual build settings needed. Every push to
#  your production branch triggers a rebuild and deploy.
# ─────────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache fingerprinted assets (Astro hashes filenames in _astro/).
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
